version: "3.8"

services:
  polymarket-bot:
    build: .
    container_name: polymarket-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
    command: ["python", "-m", "src.main", "--mode", "live", "--headless", "--override", "config/live.yaml"]
    healthcheck:
      test: ["CMD", "python", "-c", "import os, time; assert time.time() - os.path.getmtime('data/state.json') < 120"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
