# --- Global Settings ---
global:
  starting_capital: 50
  total_capital: 50
  max_capital_per_market: 50
  reprice_threshold: 0.01

# --- Asset Overrides ---
assets:
  BTC:
    enabled: true
    max_order_size: 15        # Comfortably quotes ~15 shares (~$7.50 risk per side)
    soft_limit: 40            # Pauses quoting if skewed by 40 shares (~$20 tied up)
    hard_limit: 60            # Hard emergency limit
    emergency: 70
    max_dollar_delta: 25

# --- Balance Monitor & Auto-Merge ---
balance_monitor:
  enabled: true
  warn_balance: 15.0        # Warn if USDC drops below $15
  merge_balance: 15.0       # Auto-merge matched pairs if USDC drops below $10
  min_merge_pairs: 10       # Only bother merging if we have at least 10 pairs
  check_interval: 5.0
