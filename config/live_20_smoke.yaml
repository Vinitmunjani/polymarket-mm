    api_passphrase: "33d6bcbdee83a2c8bdc30e15d3252e30db080740a21645531df0ef2dad4fa113"
    # Deposit wallet flow for current Polymarket API users.
    # Use POLYMARKET_FUNDER as the funded Polymarket deposit wallet address.
    signature_type: 3
    funder: "0x5f48a6AECFF273A212CE89704A2b897734f10280"
