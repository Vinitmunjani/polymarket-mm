  builder:
    api_key: "019e1c12-98fa-7733-b6fd-530b5fa39e70"
    secret: "IVQjlJilC2YwF1ukLG3IdxrpmBBZAHc8I0wyYZwcntY="
    passphrase: "03b9b2de2df3e394d623178178a90be154fca88e9aa6a3f95fbeba8c41ca32e3"
    relayer_api_key: "019e1b18-d496-7333-b578-63f736528848"
    relayer_api_key_address: "0x018EF4Ac09E92785c6Ab23513905290F9F7ff2cA"
    relayer_url: "https://relayer-v2.polymarket.com"

assets:
  BTC:
    enabled: true
    symbol: "BTCUSDT"
    default_sigma: 0.20
    gamma: 0.45
    gamma_near_expiry: 0.90
    min_spread: 0.01
    max_spread: 0.05
    min_order_size: 5
    max_order_size: 5
    max_dollar_delta: 12
    soft_limit: 5
    hard_limit: 10
    emergency: 12
    auto_merge_dollar_threshold: 20.0

global:
  refresh_interval: 0.25
  min_quote_interval: 0.50
  min_order_update_interval: 3.0
  # Stop quoting in final 5 minutes; this is a smoke test, not a hero arc.
  stop_quoting_seconds: 300
  reduce_size_seconds: 300
  # Sticky enough to preserve queue priority and avoid churn.
  reprice_threshold: 0.03

  starting_capital: 50
  total_capital: 50
  max_capital_per_market: 12

  # Hard loss guard for first live run: about $3 max drawdown / $4 daily loss.
  max_daily_loss_pct: 1
  max_drawdown_pct: 1

  market_discovery_interval: 30
  vol_lookback_seconds: 300
  kappa_window_seconds: 300

regime:
  lookback: 30
  trend_threshold: 0.08
  spike_threshold: 0.15

toxicity:
  window_seconds: 300
  threshold: 0.004
  edge_adverse_rate: 0.85
  edge_mean_threshold: 0.015
  edge_window: 30
  min_fills_for_halt: 4
  one_sided_fill_limit: 4
  immediate_drift_threshold: 0.02
  halt_cooldown: 120

balance_monitor:
  enabled: true
  warn_balance: 5.0
  merge_balance: 5.0
  min_merge_pairs: 2
  check_interval: 5.0

logging:
  level: "INFO"
  file: "logs/live_20_smoke.log"
  console: true
  json: true
